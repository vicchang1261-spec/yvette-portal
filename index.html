    background:#1f7aec;
    color:white;
    text-decoration:none;
    padding:12px 28px;
    border-radius:8px;
    font-weight:bold;
    transition:.3s;
}

.button:hover{
    background:#0f5fc8;
}

footer{

    margin-top:50px;
    color:#777;
    font-size:14px;
}

header h1{
    font-size:28px;

<script>

const LIFF_ID = "2010755547-Y32aWz74";

async function initLiff(){

    try{

        await liff.init({
            liffId: LIFF_ID
        });

        if(!liff.isLoggedIn()){
            liff.login();
            return;
        }

        const profile = await liff.getProfile();

        // 全站共用登入資訊
        window.userProfile = {
            userId: profile.userId,
            displayName: profile.displayName
        };

        // 只顯示歡迎訊息
        document.getElementById("loginInfo").innerHTML =
            `👋 <b>${profile.displayName}</b>，您好！歡迎使用伊凡特文教機構線上報名系統。`;

        console.log("LIFF Profile", window.userProfile);

    }catch(err){

        console.error(err);

        document.getElementById("loginInfo").innerHTML =
            "❌ 登入失敗，請由 LINE 官方帳號重新開啟此頁面。";

    }

}

initLiff();

</script>

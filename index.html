body{

    color:#333;
}

.container{
    max-width:800px;
    margin:auto;

header{

}

header p{

}

.card{

    background:white;
    border-radius:15px;
    padding:25px;
    margin-bottom:25px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
    transition:.3s;
}

.card:hover{
    transform:translateY(-4px);
}

.card h2{
    color:#1f4e79;
    margin-bottom:12px;
}

.info{
    color:#555;
    margin-bottom:10px;
}

.status{
    display:inline-block;
    background:#2ecc71;
    color:white;
    padding:6px 14px;
    border-radius:20px;
    font-size:14px;
    margin-bottom:20px;
}

.button{

    display:inline-block;
    background:#1f7aec;
    color:white;
    text-decoration:none;
    padding:12px 28px;
    border-radius:8px;
    font-weight:bold;
    transition:.3s;
}

.button:hover{

    background:#0f5fc8;
}

footer{

    text-align:center;
    margin-top:50px;
    color:#777;
    font-size:14px;
}

@media(max-width:600px){

header h1{
    font-size:28px;
}

header p{
    font-size:16px;
}

.card{
    padding:20px;
}

}

</style>
